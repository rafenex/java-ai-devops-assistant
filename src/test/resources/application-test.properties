spring.datasource.url=jdbc:h2:mem:aiassistant-test;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
spring.datasource.driver-class-name=org.h2.Driver
spring.datasource.username=sa
spring.datasource.password=

spring.jpa.hibernate.ddl-auto=create-drop
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=false

spring.flyway.enabled=false

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=always

# IA fake nos testes
ai.provider=fake
ai.provider.type=fake

# Necess·rio porque o Spring AI tenta criar beans OpenAI no contexto
spring.ai.openai.api-key=test-key
spring.ai.openai.speech.api-key=test-key

logging.level.org.springframework=INFO
logging.level.org.hibernate=WARN