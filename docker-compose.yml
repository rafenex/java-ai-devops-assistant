services:
  postgres:
    image: postgres:16
    container_name: aiassistant-postgres
    environment:
      POSTGRES_DB: aiassistant
      POSTGRES_USER: aiassistant
      POSTGRES_PASSWORD: aiassistant
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: